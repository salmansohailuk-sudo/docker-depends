# =============================================================================
# nginx.conf — Nginx server configuration
#
# Two responsibilities:
#   1. Serve static files (HTML/CSS/JS) for any normal browser request
#   2. Proxy /api/* requests to the Flask backend container
#
# Why a proxy? The browser loads the page from http://localhost (port 80).
# If script.js tried to call http://localhost:8080 directly it would be a
# cross-origin request and likely blocked. Instead, script.js calls /api/user
# and Nginx silently forwards it to the backend — same origin, no CORS issues.
# =============================================================================

server {
    # Listen on port 80 — the standard HTTP port.
    listen 80;

    # "_" matches any hostname (localhost, an IP, a domain name, etc.)
    server_name _;

    # The folder where Nginx looks for files to serve.
    # This matches where the Dockerfile copies index.html, style.css, etc.
    root /usr/share/nginx/html;

    # Default file to serve when a request targets a directory (e.g. "/").
    index index.html;

    # ── Route 1: Static files ─────────────────────────────────────────────────
    # Handles every request that does NOT start with /api/.
    # try_files checks for the file on disk, then the path as a directory,
    # then falls back to index.html (needed for single-page apps).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Route 2: API proxy ────────────────────────────────────────────────────
    # Any request to /api/* is forwarded to the Flask container.
    # The trailing slash on proxy_pass strips the /api prefix before forwarding,
    # so /api/user becomes /user when it reaches Flask.
    #
    # Example:
    #   Browser sends:   GET http://localhost/api/user
    #   Nginx forwards:  GET http://backend_app:8080/user
    #   Flask receives:  GET /user
    location /api/ {
        # "backend_app" is the Docker Compose service name — Docker's internal
        # DNS resolves it to the backend container's IP automatically.
        proxy_pass http://backend_app:8080/;

        # Use HTTP/1.1 for the connection to the backend (required for keep-alive).
        proxy_http_version 1.1;

        # Forward useful headers so Flask can see the real client info.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Fail a request if Flask takes more than 30 seconds to respond.
        proxy_read_timeout 30s;
    }
}
